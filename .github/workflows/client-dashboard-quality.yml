name: Client Dashboard Quality Gates

on:
  pull_request:
    paths:
      - 'client-dashboard/**'
      - '.github/workflows/client-dashboard-quality.yml'
  push:
    branches:
      - main
    paths:
      - 'client-dashboard/**'
      - '.github/workflows/client-dashboard-quality.yml'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint (strict)
        run: npm run lint:strict

      - name: Unit tests
        run: npm run test:unit
